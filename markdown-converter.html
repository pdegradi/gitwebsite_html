<body>
  <div class="container">
    <header>
      <h1>Markdown to HTML Converter</h1>
    </header>

    <div class="editors">
      <div class="editor-panel">
        <label for="markdown-input">Markdown Input</label>
        <textarea id="markdown-input" placeholder="Enter your Markdown text here..."></textarea>
      </div>
      <div class="editor-panel">
        <label for="html-output">HTML Output</label>
        <textarea id="html-output" placeholder="The HTML result will appear here..." readonly></textarea>
      </div>
    </div>

    <div class="actions">
      <button class="btn-convert" id="convert-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Convert Markdown to HTML
      </button>
      <button class="btn-copy" id="copy-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
        Copy HTML
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const INDENT = '\t';

    function beautifyHTML(html) {
      const selfClosing = ['br', 'hr', 'img', 'input', 'meta', 'link'];
      const voidElements = new Set(selfClosing);

      let formatted = '';
      let indent = 0;

      const tokens = html.match(/<[^>]+>|[^<]+/g);
      if (!tokens) return html;

      for (let i = 0; i < tokens.length; i++) {
        const token = tokens[i];

        if (token.startsWith('<!--')) {
          formatted += INDENT.repeat(indent) + token.trim() + '\n';
          continue;
        }

        if (token.startsWith('</')) {
          indent = Math.max(0, indent - 1);
          formatted += INDENT.repeat(indent) + token.trim() + '\n';
          continue;
        }

        if (token.startsWith('<')) {
          const tagMatch = token.match(/^<(\w+)/);
          const tagName = tagMatch ? tagMatch[1].toLowerCase() : '';
          const isSelfClosing = token.endsWith('/>') || voidElements.has(tagName);

          formatted += INDENT.repeat(indent) + token.trim() + '\n';

          if (!isSelfClosing && !token.includes('</')) {
            const closingIdx = tokens.slice(i + 1).findIndex(t => t.startsWith(`</${tagName}>`));
            if (closingIdx !== -1) {
              indent++;
            }
          }
          continue;
        }

        const text = token.trim();
        if (text) {
          formatted += INDENT.repeat(indent) + text + '\n';
        }
      }

      return formatted.trim();
    }

    function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      } else {
        return new Promise((resolve, reject) => {
          const textArea = document.createElement('textarea');
          textArea.value = text;
          textArea.style.position = 'fixed';
          textArea.style.left = '-999999px';
          textArea.style.top = '-999999px';
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try {
            document.execCommand('copy');
            document.body.removeChild(textArea);
            resolve();
          } catch (err) {
            document.body.removeChild(textArea);
            reject(err);
          }
        });
      }
    }

    const markdownInput = document.getElementById('markdown-input');
    const htmlOutput = document.getElementById('html-output');
    const convertBtn = document.getElementById('convert-btn');
    const copyBtn = document.getElementById('copy-btn');

    convertBtn.addEventListener('click', () => {
      const result = marked.parse(markdownInput.value);
      htmlOutput.value = beautifyHTML(result);
    });

    copyBtn.addEventListener('click', async () => {
      const text = htmlOutput.value;
      if (!text) return;

      try {
        await copyToClipboard(text);
        copyBtn.classList.add('copied');
        const originalHTML = copyBtn.innerHTML;
        copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg> Copied!`;
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.innerHTML = originalHTML;
        }, 2000);
      } catch (err) {
        console.error('Copy error:', err);
      }
    });
  </script>
