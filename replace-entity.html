    <style>
        *{
            box-sizing: border-box;
        }
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #2b2b2b;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            width: min(600px, 80%);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #333;
            background-color: #333;
            color: #e0e0e0;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;

        }

            .container {

            }
        }

<body>
    <div class="container">
        <h1>HTML Entity Encoder</h1>
        <textarea id="inputText" placeholder="Paste your HTML/XML code here..."></textarea>
        <button onclick="replaceCharacters()">Encode</button>
        <textarea id="outputText" placeholder="Output will appear here..." readonly></textarea>
    </div>
    <script>
        function replaceCharacters() {
            const inputText = document.getElementById('inputText').value;
            const replacedText = inputText.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            document.getElementById('outputText').value = replacedText;
        }
    </script>
</body>
